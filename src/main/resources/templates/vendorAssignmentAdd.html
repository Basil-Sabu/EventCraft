<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Assign Vendor</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body class="dashboard-page">

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="main-content">
<div class="form-card">

<h2 th:text="${assignment.assignmentId == null
        ? 'Assign Vendor to Event'
        : 'Edit Vendor Assignment'}">
</h2>

<div th:if="${successMessage}" class="success-msg" th:text="${successMessage}"></div>
<div th:if="${errorMessage}" class="error-msg" th:text="${errorMessage}"></div>

<!-- ===============================
     CLIENT + EVENT + TYPE FORM
=============================== -->
<form method="get" th:action="@{/vendor-assignment/add}">

    <label>Client</label>
    <select name="clientId" onchange="this.form.submit()">
        <option value="">-- Select Client --</option>
        <option th:each="c : ${clients}"
                th:value="${c.clientId}"
                th:text="${c.clientName}"
                th:selected="${selectedClientId == c.clientId}">
        </option>
    </select>

    <label>Event</label>
    <select name="eventId"
            onchange="this.form.submit()"
            th:disabled="${events == null}">
        <option value="">-- Select Event --</option>
        <option th:each="e : ${events}"
                th:value="${e.eventId}"
                th:text="${e.eventName}"
                th:selected="${selectedEventId == e.eventId}">
        </option>
    </select>

    <label>Vendor Type</label>
    <select name="vendorType"
            onchange="this.form.submit()"
            th:disabled="${selectedEventId == null}">
        <option value="">-- Select Vendor Type --</option>
        <option th:each="type : ${vendorTypes}"
                th:value="${type}"
                th:text="${type}"
                th:selected="${selectedVendorType == type}">
        </option>
    </select>

</form>


<!-- ===============================
     VIEW LINK (AFTER EVENT)
=============================== -->
<a th:if="${selectedEventId != null}"
   th:href="@{/vendor-assignment/list(eventId=${selectedEventId})}"
   class="secondary-link"
   style="display:block; margin:18px 0;">
    View Assigned Vendors
</a>

<!-- ===============================
     ASSIGNMENT FORM
=============================== -->
<form th:action="@{/vendor-assignment/save}"
      method="post"
      th:object="${assignment}"
      th:if="${vendors != null}">

    <input type="hidden" name="eventId" th:value="${selectedEventId}">

    <label>Vendor</label>
    <select name="vendorId" required>
        <option value="">-- Select Vendor --</option>
        <option th:each="v : ${vendors}"
                th:value="${v.vendorId}"
                th:text="${v.vendorName}">
        </option>
    </select>

    <label>Agreed Cost</label>
    <input type="number" step="0.01" th:field="*{agreedCost}" required>

   <button class="primary-btn"
        th:text="${assignment.assignmentId == null
        ? 'Assign Vendor'
        : 'Update Vendor'}">
</button>
</form>

</div>
</main>
</body>
</html>
