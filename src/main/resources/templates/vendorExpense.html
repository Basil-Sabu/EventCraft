<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Vendor Expense</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body class="dashboard-page">

    <!-- Sidebar -->
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <!-- Main Content -->
    <main class="main-content">

        <div class="form-card">

            <h2>Vendor Expense (Payment to Vendor)</h2>

            <!-- ===============================
                 SUCCESS / ERROR MESSAGES
            ================================ -->
            <div th:if="${successMessage}" class="success-msg">
                <span th:text="${successMessage}"></span>
            </div>

            <div th:if="${errorMessage}" class="error-msg">
                <span th:text="${errorMessage}"></span>
            </div>

            <!-- ===============================
                 CLIENT → EVENT → VENDOR SELECTION
            ================================ -->
            <form th:action="@{/vendor-expense}" method="get">

                <label>Client</label>
                <select name="clientId"
                        onchange="this.form.submit()"
                        required>
                    <option value="">-- Select Client --</option>
                    <option th:each="c : ${clients}"
                            th:value="${c.clientId}"
                            th:text="${c.clientName}"
                            th:selected="${selectedClientId == c.clientId}">
                    </option>
                </select>

                <label>Event</label>
                <select name="eventId"
                        onchange="this.form.submit()"
                        th:disabled="${events == null}"
                        required>
                    <option value="">-- Select Event --</option>
                    <option th:each="e : ${events}"
                            th:value="${e.eventId}"
                            th:text="${e.eventName}"
                            th:selected="${selectedEventId == e.eventId}">
                    </option>
                </select>

                <label>Vendor</label>
                <select name="assignmentId"
                        onchange="this.form.submit()"
                        th:disabled="${assignments == null}"
                        required>
                    <option value="">-- Select Vendor --</option>
                    <option th:each="a : ${assignments}"
                            th:value="${a.assignmentId}"
                            th:text="${a.vendor.vendorName}"
                            th:selected="${selectedAssignmentId == a.assignmentId}">
                    </option>
                </select>

            </form>

            <!-- ===============================
                 PAYMENT SUMMARY
            ================================ -->
            <div th:if="${assignment != null}" style="margin-top:25px;">

                <table class="crud-table">
                    <tbody>
                        <tr>
                            <th>Agreed Cost</th>
                            <td th:text="${agreedCost}"></td>
                        </tr>
                        <tr>
                            <th>Paid So Far</th>
                            <td th:text="${paidSoFar}"></td>
                        </tr>
                        <tr>
                            <th>Remaining</th>
                            <td th:text="${remaining}"></td>
                        </tr>
                    </tbody>
                </table>

            </div>

            <!-- ===============================
                 ADD VENDOR PAYMENT
            ================================ -->
            <div th:if="${assignment != null}" style="margin-top:30px;">

                <form th:action="@{/vendor-expense/save}"
                      th:object="${vendorExpense}"
                      method="post">

                   <input type="hidden" name="clientId"
           th:value="${selectedClientId}">

    <input type="hidden" name="eventId"
           th:value="${selectedEventId}">

    <input type="hidden" name="assignmentId"
           th:value="${assignment.assignmentId}">

    <!-- Existing hidden binding -->
    <input type="hidden"
           name="assignment.assignmentId"
           th:value="${assignment.assignmentId}">

                    <label>Paid Amount</label>
                    <input type="number"
                           th:field="*{paidAmount}"
                           step="0.01"
                           min="1"
                           th:disabled="${remaining <= 0}"
                           required>

                    <label>Payment Type</label>
                    <select th:field="*{paymentType}" required>
                        <option value="">-- Select Type --</option>
                        <option value="ADVANCE">Advance</option>
                        <option value="FINAL">Final</option>
                    </select>

                    <label>Payment Mode</label>
                    <select th:field="*{paymentMode}" required>
                        <option value="">-- Select Mode --</option>
                        <option value="CASH">Cash</option>
                        <option value="UPI">UPI</option>
                        <option value="BANK">Bank</option>
                    </select>

                    <label>Payment Date</label>
                    <input type="date" th:field="*{paymentDate}">

                    <button type="submit"
                            class="primary-btn"
                            th:disabled="${remaining <= 0}">
                        Save Vendor Payment
                    </button>

                    <a th:href="@{/vendor-expense/history(assignmentId=${assignment.assignmentId})}"
                       class="secondary-link">
                        View Payment History
                    </a>

                </form>

            </div>

        </div>

    </main>

</body>
</html>
