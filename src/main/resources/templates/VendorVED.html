<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Vendor List</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body class="crud-page">

    <div class="table-card">

        <!-- HEADER -->
        <div class="table-header">
            <a href="javascript:history.back()"
               class="table-btn back-btn">
                ← Back
            </a>

            <h2>Vendor List</h2>
        </div>

        <!-- TABLE -->
        <div class="table-scroll">
            <table class="crud-table">

                <thead>
                    <tr>
                        <th>Vendor Type</th>
                        <th>Vendor Name</th>
                        <th>Contact</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="v : ${vendors}">
                        <td th:text="${v.vendorType}"></td>
                        <td th:text="${v.vendorName}"></td>
                        <td th:text="${v.contact}"></td>
                        <td>
                            <a th:href="@{/vendors/edit/{id}(id=${v.vendorId})}"
                               class="table-btn edit">
                                Edit
                            </a>

                            <a th:href="@{/vendors/delete/{id}(id=${v.vendorId})}"
                               class="table-btn delete"
                               onclick="return confirm('Are you sure you want to delete this vendor?')">
                                Delete
                            </a>
                        </td>
                    </tr>

                    <!-- EMPTY STATE -->
                    <tr th:if="${#lists.isEmpty(vendors)}">
                        <td colspan="4" class="no-data">
                            No vendors found
                        </td>
                    </tr>
                </tbody>

            </table>
        </div>

    </div>

</body>
</html>
